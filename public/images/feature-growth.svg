<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bgGradGrowth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadowGrowth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmGrowth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="url(#bgGradGrowth)"/>
  
  <!-- Main Growth Chart Window -->
  <rect x="70" y="30" width="420" height="280" rx="12" fill="#ffffff" filter="url(#shadowGrowth)"/>
  
  <!-- Window Header -->
  <rect x="70" y="30" width="420" height="40" rx="12" fill="#f8fafc"/>
  <rect x="70" y="58" width="420" height="12" fill="#f8fafc"/>
  <circle cx="92" cy="50" r="6" fill="#ef4444"/>
  <circle cx="110" cy="50" r="6" fill="#eab308"/>
  <circle cx="128" cy="50" r="6" fill="#22c55e"/>
  <text x="280" y="55" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="600" text-anchor="middle">Business Growth Overview</text>
  
  <!-- Chart Title -->
  <text x="95" y="95" font-family="system-ui" font-size="12" fill="#0f172a" font-weight="600">Revenue Growth</text>
  <rect x="400" y="82" width="70" height="20" rx="4" fill="#f0fdfa"/>
  <text x="435" y="96" font-family="system-ui" font-size="9" fill="#0d9488" font-weight="600" text-anchor="middle">↑ 127%</text>
  
  <!-- Y-axis labels -->
  <text x="90" y="125" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="end">$80K</text>
  <text x="90" y="160" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="end">$60K</text>
  <text x="90" y="195" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="end">$40K</text>
  <text x="90" y="230" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="end">$20K</text>
  <text x="90" y="265" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="end">$0</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="120" x2="470" y2="120" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="155" x2="470" y2="155" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="190" x2="470" y2="190" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="225" x2="470" y2="225" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="100" y1="260" x2="470" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- X-axis labels -->
  <text x="120" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Jan</text>
  <text x="170" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Feb</text>
  <text x="220" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Mar</text>
  <text x="270" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Apr</text>
  <text x="320" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">May</text>
  <text x="370" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Jun</text>
  <text x="420" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Jul</text>
  <text x="460" y="280" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">Aug</text>
  
  <!-- Area fill under curve -->
  <path d="M120 250 Q 170 245, 220 235 Q 270 220, 320 195 Q 370 165, 420 140 Q 445 125, 460 115 L 460 260 L 120 260 Z" 
        fill="url(#chartGrad)"/>
  
  <!-- Main growth curve -->
  <path d="M120 250 Q 170 245, 220 235 Q 270 220, 320 195 Q 370 165, 420 140 Q 445 125, 460 115" 
        stroke="#0d9488" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data points -->
  <circle cx="120" cy="250" r="5" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="220" cy="235" r="5" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="320" cy="195" r="5" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="420" cy="140" r="5" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <circle cx="460" cy="115" r="6" fill="#0d9488" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Current value tooltip -->
  <rect x="430" y="85" width="55" height="25" rx="6" fill="#0f172a"/>
  <text x="457" y="102" font-family="system-ui" font-size="10" fill="#ffffff" font-weight="600" text-anchor="middle">$78.5K</text>
  <polygon points="457,110 452,115 462,115" fill="#0f172a"/>
  
  <!-- Analytics Dashboard (Below) -->
  <rect x="40" y="320" width="520" height="150" rx="12" fill="#ffffff" filter="url(#shadowGrowth)"/>
  
  <!-- Dashboard Header -->
  <text x="65" y="350" font-family="system-ui" font-size="12" fill="#0f172a" font-weight="600">Performance Metrics</text>
  <rect x="480" y="335" width="60" height="22" rx="4" fill="#f8fafc"/>
  <text x="510" y="350" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">This Month</text>
  
  <!-- Stat Cards Row -->
  <!-- Opportunities -->
  <rect x="55" y="365" width="90" height="55" rx="6" fill="#f8fafc"/>
  <text x="65" y="382" font-family="system-ui" font-size="8" fill="#64748b">Opportunities</text>
  <text x="65" y="405" font-family="system-ui" font-size="20" fill="#0f172a" font-weight="700">382</text>
  
  <!-- Won -->
  <rect x="155" y="365" width="90" height="55" rx="6" fill="#f8fafc"/>
  <text x="165" y="382" font-family="system-ui" font-size="8" fill="#64748b">Won</text>
  <text x="165" y="405" font-family="system-ui" font-size="20" fill="#0d9488" font-weight="700">44</text>
  
  <!-- Open -->
  <rect x="255" y="365" width="90" height="55" rx="6" fill="#f8fafc"/>
  <text x="265" y="382" font-family="system-ui" font-size="8" fill="#64748b">Open</text>
  <text x="265" y="405" font-family="system-ui" font-size="20" fill="#0f172a" font-weight="700">105</text>
  
  <!-- Lost -->
  <rect x="355" y="365" width="90" height="55" rx="6" fill="#f8fafc"/>
  <text x="365" y="382" font-family="system-ui" font-size="8" fill="#64748b">Lost</text>
  <text x="365" y="405" font-family="system-ui" font-size="20" fill="#ef4444" font-weight="700">74</text>
  
  <!-- Abandoned -->
  <rect x="455" y="365" width="90" height="55" rx="6" fill="#f8fafc"/>
  <text x="465" y="382" font-family="system-ui" font-size="8" fill="#64748b">Abandoned</text>
  <text x="465" y="405" font-family="system-ui" font-size="20" fill="#94a3b8" font-weight="700">76</text>
  
  <!-- Revenue Row -->
  <rect x="55" y="428" width="150" height="32" rx="6" fill="#f0fdfa"/>
  <text x="65" y="440" font-family="system-ui" font-size="8" fill="#64748b">Total Revenue</text>
  <text x="65" y="454" font-family="system-ui" font-size="12" fill="#0d9488" font-weight="700">$1.60 M</text>
  
  <rect x="215" y="428" width="150" height="32" rx="6" fill="#f0fdfa"/>
  <text x="225" y="440" font-family="system-ui" font-size="8" fill="#64748b">Amount Won</text>
  <text x="225" y="454" font-family="system-ui" font-size="12" fill="#0d9488" font-weight="700">$1.50 M</text>
  
  <rect x="375" y="428" width="170" height="32" rx="6" fill="#fef3c7"/>
  <text x="385" y="440" font-family="system-ui" font-size="8" fill="#64748b">Amount Open</text>
  <text x="385" y="454" font-family="system-ui" font-size="12" fill="#b45309" font-weight="700">$697.67 K</text>
  
  <!-- Funnel Mini Chart (Floating) -->
  <rect x="480" y="180" width="110" height="130" rx="10" fill="#ffffff" filter="url(#shadowSmGrowth)"/>
  <text x="535" y="200" font-family="system-ui" font-size="9" fill="#0f172a" font-weight="600" text-anchor="middle">Funnel Status</text>
  
  <!-- Mini funnel visualization -->
  <path d="M500 215 L570 215 L555 245 L515 245 Z" fill="#0d9488" opacity="0.9"/>
  <path d="M515 250 L555 250 L545 275 L525 275 Z" fill="#0d9488" opacity="0.7"/>
  <path d="M525 280 L545 280 L540 300 L530 300 Z" fill="#0d9488" opacity="0.5"/>
  
  <!-- Funnel labels -->
  <text x="575" y="233" font-family="system-ui" font-size="7" fill="#64748b">Open: 79</text>
  <text x="575" y="265" font-family="system-ui" font-size="7" fill="#64748b">Lost: 74</text>
  <text x="575" y="293" font-family="system-ui" font-size="7" fill="#64748b">Won: 44</text>
</svg>