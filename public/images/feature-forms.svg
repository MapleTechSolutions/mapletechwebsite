<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad2)"/>
  
  <!-- Main Browser Window -->
  <rect x="30" y="30" width="540" height="340" rx="12" fill="#ffffff" filter="url(#shadow2)"/>
  
  <!-- Browser Header -->
  <rect x="30" y="30" width="540" height="40" rx="12" fill="#f1f5f9"/>
  <rect x="30" y="58" width="540" height="12" fill="#f1f5f9"/>
  <circle cx="52" cy="50" r="6" fill="#ef4444"/>
  <circle cx="72" cy="50" r="6" fill="#eab308"/>
  <circle cx="92" cy="50" r="6" fill="#22c55e"/>
  <rect x="120" y="42" width="200" height="16" rx="4" fill="#e2e8f0"/>
  <text x="135" y="54" font-family="system-ui" font-size="9" fill="#64748b">app.mapletechsolutions.com/forms</text>
  
  <!-- Left Panel - Form Elements -->
  <rect x="40" y="80" width="140" height="280" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="105" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">Form Elements</text>
  
  <!-- Draggable Elements -->
  <rect x="50" y="120" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="130" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="140" font-family="system-ui" font-size="10" fill="#475569">Text Field</text>
  
  <rect x="50" y="160" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="170" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="180" font-family="system-ui" font-size="10" fill="#475569">Email</text>
  
  <rect x="50" y="200" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="210" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="220" font-family="system-ui" font-size="10" fill="#475569">Phone</text>
  
  <rect x="50" y="240" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="250" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="260" font-family="system-ui" font-size="10" fill="#475569">Dropdown</text>
  
  <rect x="50" y="280" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="290" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="300" font-family="system-ui" font-size="10" fill="#475569">Checkbox</text>
  
  <rect x="50" y="320" width="120" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm2)"/>
  <rect x="60" y="330" width="12" height="12" rx="2" fill="#0d9488"/>
  <text x="80" y="340" font-family="system-ui" font-size="10" fill="#475569">Date Picker</text>
  
  <!-- Center Panel - Form Preview -->
  <rect x="195" y="80" width="220" height="280" rx="8" fill="#ffffff" stroke="#0d9488" stroke-width="2" stroke-dasharray="4"/>
  <text x="260" y="100" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">FORM PREVIEW</text>
  
  <!-- Form Being Built -->
  <rect x="210" y="115" width="190" height="235" rx="8" fill="#ffffff" filter="url(#shadow2)"/>
  
  <text x="225" y="140" font-family="system-ui" font-size="14" fill="#0f172a" font-weight="700">Get a Free Quote</text>
  <text x="225" y="156" font-family="system-ui" font-size="9" fill="#64748b">Fill out the form below</text>
  
  <!-- Form Fields -->
  <text x="225" y="178" font-family="system-ui" font-size="9" fill="#475569" font-weight="600">Full Name *</text>
  <rect x="225" y="184" width="160" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="235" y="202" font-family="system-ui" font-size="10" fill="#94a3b8">Enter your name</text>
  
  <text x="225" y="226" font-family="system-ui" font-size="9" fill="#475569" font-weight="600">Email Address *</text>
  <rect x="225" y="232" width="160" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="235" y="250" font-family="system-ui" font-size="10" fill="#94a3b8">you@example.com</text>
  
  <text x="225" y="274" font-family="system-ui" font-size="9" fill="#475569" font-weight="600">Service Type</text>
  <rect x="225" y="280" width="160" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="235" y="298" font-family="system-ui" font-size="10" fill="#94a3b8">Select a service...</text>
  <text x="373" y="298" font-family="system-ui" font-size="10" fill="#94a3b8">▼</text>
  
  <!-- Submit Button -->
  <rect x="225" y="318" width="160" height="32" rx="6" fill="#0d9488"/>
  <text x="305" y="339" font-family="system-ui" font-size="11" fill="#ffffff" font-weight="600" text-anchor="middle">Submit Request</text>
  
  <!-- Drag indicator -->
  <path d="M180 200 C 190 200, 195 180, 210 178" stroke="#0d9488" stroke-width="2" fill="none" stroke-dasharray="4"/>
  <circle cx="175" cy="200" r="8" fill="#0d9488" opacity="0.3"/>
  
  <!-- Right Panel - Settings -->
  <rect x="430" y="80" width="130" height="280" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="445" y="105" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">Field Settings</text>
  
  <text x="445" y="130" font-family="system-ui" font-size="9" fill="#64748b">Label</text>
  <rect x="445" y="136" width="100" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="453" y="152" font-family="system-ui" font-size="9" fill="#0f172a">Full Name</text>
  
  <text x="445" y="176" font-family="system-ui" font-size="9" fill="#64748b">Placeholder</text>
  <rect x="445" y="182" width="100" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="453" y="198" font-family="system-ui" font-size="9" fill="#94a3b8">Enter your name</text>
  
  <text x="445" y="222" font-family="system-ui" font-size="9" fill="#64748b">Validation</text>
  <rect x="445" y="230" width="14" height="14" rx="3" fill="#0d9488"/>
  <text x="445" y="240" font-family="system-ui" font-size="12" fill="#ffffff" text-anchor="middle" x="452">✓</text>
  <text x="467" y="241" font-family="system-ui" font-size="9" fill="#475569">Required</text>
  
  <rect x="445" y="255" width="14" height="14" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="467" y="266" font-family="system-ui" font-size="9" fill="#475569">Show in CRM</text>
  
  <!-- Automation Badge -->
  <rect x="445" y="290" width="100" height="55" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text x="455" y="308" font-family="system-ui" font-size="8" fill="#0d9488" font-weight="600">AUTOMATION</text>
  <text x="455" y="324" font-family="system-ui" font-size="9" fill="#475569">On Submit:</text>
  <text x="455" y="338" font-family="system-ui" font-size="8" fill="#0f172a">→ Add to CRM</text>
</svg>