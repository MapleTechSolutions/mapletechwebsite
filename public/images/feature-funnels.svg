<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  
  <!-- Main Browser Window -->
  <rect x="30" y="30" width="540" height="340" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- Browser Header -->
  <rect x="30" y="30" width="540" height="40" rx="12" fill="#f1f5f9"/>
  <rect x="30" y="58" width="540" height="12" fill="#f1f5f9"/>
  <circle cx="52" cy="50" r="6" fill="#ef4444"/>
  <circle cx="72" cy="50" r="6" fill="#eab308"/>
  <circle cx="92" cy="50" r="6" fill="#22c55e"/>
  
  <!-- URL Bar -->
  <rect x="120" y="42" width="200" height="16" rx="4" fill="#e2e8f0"/>
  <text x="135" y="54" font-family="system-ui" font-size="9" fill="#64748b">app.mapletechsolutions.com</text>
  
  <!-- Sidebar -->
  <rect x="30" y="70" width="120" height="300" fill="#0f172a"/>
  
  <!-- Sidebar Items -->
  <rect x="42" y="90" width="96" height="28" rx="6" fill="#1e293b"/>
  <text x="54" y="108" font-family="system-ui" font-size="10" fill="#94a3b8">Dashboard</text>
  
  <rect x="42" y="126" width="96" height="28" rx="6" fill="#0d9488"/>
  <text x="54" y="144" font-family="system-ui" font-size="10" fill="#ffffff" font-weight="600">Funnels</text>
  
  <rect x="42" y="162" width="96" height="28" rx="6" fill="#1e293b"/>
  <text x="54" y="180" font-family="system-ui" font-size="10" fill="#94a3b8">Contacts</text>
  
  <rect x="42" y="198" width="96" height="28" rx="6" fill="#1e293b"/>
  <text x="54" y="216" font-family="system-ui" font-size="10" fill="#94a3b8">Campaigns</text>
  
  <!-- Main Content Area -->
  <rect x="150" y="70" width="420" height="300" fill="#ffffff"/>
  
  <!-- Header -->
  <text x="170" y="100" font-family="system-ui" font-size="16" fill="#0f172a" font-weight="700">Funnel Builder</text>
  <rect x="450" y="82" width="100" height="28" rx="6" fill="#0d9488"/>
  <text x="473" y="100" font-family="system-ui" font-size="11" fill="#ffffff" font-weight="600">+ New Funnel</text>
  
  <!-- Funnel Visualization -->
  <!-- Stage 1 -->
  <rect x="180" y="130" width="140" height="50" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2" filter="url(#shadowSm)"/>
  <circle cx="200" cy="155" r="12" fill="#0d9488"/>
  <text x="200" y="159" font-family="system-ui" font-size="10" fill="#ffffff" text-anchor="middle">1</text>
  <text x="225" y="150" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="600">Landing Page</text>
  <text x="225" y="164" font-family="system-ui" font-size="9" fill="#64748b">2,450 visitors</text>
  
  <!-- Arrow 1 -->
  <path d="M320 155 L350 155" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="350,155 343,150 343,160" fill="#cbd5e1"/>
  
  <!-- Stage 2 -->
  <rect x="360" y="130" width="140" height="50" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2" filter="url(#shadowSm)"/>
  <circle cx="380" cy="155" r="12" fill="#0d9488"/>
  <text x="380" y="159" font-family="system-ui" font-size="10" fill="#ffffff" text-anchor="middle">2</text>
  <text x="405" y="150" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="600">Lead Form</text>
  <text x="405" y="164" font-family="system-ui" font-size="9" fill="#64748b">890 leads</text>
  
  <!-- Arrow 2 -->
  <path d="M430 180 L430 205" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="430,210 425,200 435,200" fill="#cbd5e1"/>
  
  <!-- Stage 3 -->
  <rect x="360" y="215" width="140" height="50" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2" filter="url(#shadowSm)"/>
  <circle cx="380" cy="240" r="12" fill="#0d9488"/>
  <text x="380" y="244" font-family="system-ui" font-size="10" fill="#ffffff" text-anchor="middle">3</text>
  <text x="405" y="235" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="600">Email Sequence</text>
  <text x="405" y="249" font-family="system-ui" font-size="9" fill="#64748b">456 engaged</text>
  
  <!-- Arrow 3 -->
  <path d="M360 240 L330 240" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <polygon points="320,240 330,235 330,245" fill="#cbd5e1"/>
  
  <!-- Stage 4 -->
  <rect x="180" y="215" width="140" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadowSm)"/>
  <circle cx="200" cy="240" r="12" fill="#f59e0b"/>
  <text x="200" y="244" font-family="system-ui" font-size="10" fill="#ffffff" text-anchor="middle">4</text>
  <text x="225" y="235" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="600">Book Call</text>
  <text x="225" y="249" font-family="system-ui" font-size="9" fill="#64748b">124 booked</text>
  
  <!-- Conversion Stats Bar -->
  <rect x="170" y="290" width="380" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="190" y="312" font-family="system-ui" font-size="10" fill="#64748b">Conversion Rate</text>
  <text x="190" y="332" font-family="system-ui" font-size="18" fill="#0d9488" font-weight="700">36.3%</text>
  
  <text x="310" y="312" font-family="system-ui" font-size="10" fill="#64748b">Total Revenue</text>
  <text x="310" y="332" font-family="system-ui" font-size="18" fill="#0f172a" font-weight="700">$48,920</text>
  
  <text x="430" y="312" font-family="system-ui" font-size="10" fill="#64748b">Active Leads</text>
  <text x="430" y="332" font-family="system-ui" font-size="18" fill="#0f172a" font-weight="700">456</text>
</svg>