<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad3)"/>
  
  <!-- Main Browser Window -->
  <rect x="30" y="30" width="540" height="340" rx="12" fill="#ffffff" filter="url(#shadow3)"/>
  
  <!-- Browser Header -->
  <rect x="30" y="30" width="540" height="40" rx="12" fill="#f1f5f9"/>
  <rect x="30" y="58" width="540" height="12" fill="#f1f5f9"/>
  <circle cx="52" cy="50" r="6" fill="#ef4444"/>
  <circle cx="72" cy="50" r="6" fill="#eab308"/>
  <circle cx="92" cy="50" r="6" fill="#22c55e"/>
  <rect x="120" y="42" width="220" height="16" rx="4" fill="#e2e8f0"/>
  <text x="135" y="54" font-family="system-ui" font-size="9" fill="#64748b">app.mapletechsolutions.com/calendar</text>
  
  <!-- Header Bar -->
  <rect x="40" y="80" width="520" height="40" fill="#ffffff"/>
  <text x="55" y="105" font-family="system-ui" font-size="14" fill="#0f172a" font-weight="700">Appointment Calendar</text>
  <rect x="430" y="88" width="120" height="28" rx="6" fill="#0d9488"/>
  <text x="458" y="106" font-family="system-ui" font-size="10" fill="#ffffff" font-weight="600">+ New Booking</text>
  
  <!-- Calendar Section -->
  <rect x="40" y="130" width="340" height="230" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm3)"/>
  
  <!-- Month Header -->
  <rect x="40" y="130" width="340" height="35" rx="8" fill="#f8fafc"/>
  <text x="55" y="152" font-family="system-ui" font-size="11" fill="#64748b">◀</text>
  <text x="195" y="153" font-family="system-ui" font-size="12" fill="#0f172a" font-weight="700" text-anchor="middle">December 2024</text>
  <text x="350" y="152" font-family="system-ui" font-size="11" fill="#64748b">▶</text>
  
  <!-- Day Headers -->
  <text x="62" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Sun</text>
  <text x="110" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Mon</text>
  <text x="158" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Tue</text>
  <text x="206" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Wed</text>
  <text x="254" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Thu</text>
  <text x="302" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Fri</text>
  <text x="350" y="182" font-family="system-ui" font-size="9" fill="#94a3b8" text-anchor="middle">Sat</text>
  
  <!-- Calendar Grid - Week 1 -->
  <text x="62" y="208" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">1</text>
  <text x="110" y="208" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">2</text>
  <text x="158" y="208" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">3</text>
  <text x="206" y="208" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">4</text>
  <circle cx="254" cy="204" r="12" fill="#0d9488"/>
  <text x="254" y="208" font-family="system-ui" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">5</text>
  <text x="302" y="208" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">6</text>
  <text x="350" y="208" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">7</text>
  
  <!-- Week 2 -->
  <text x="62" y="238" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">8</text>
  <text x="110" y="238" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">9</text>
  <rect x="146" y="225" width="24" height="20" rx="4" fill="#fef3c7"/>
  <text x="158" y="238" font-family="system-ui" font-size="10" fill="#b45309" text-anchor="middle" font-weight="500">10</text>
  <text x="206" y="238" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">11</text>
  <rect x="242" y="225" width="24" height="20" rx="4" fill="#dcfce7"/>
  <text x="254" y="238" font-family="system-ui" font-size="10" fill="#15803d" text-anchor="middle" font-weight="500">12</text>
  <text x="302" y="238" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">13</text>
  <text x="350" y="238" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">14</text>
  
  <!-- Week 3 -->
  <text x="62" y="268" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">15</text>
  <rect x="98" y="255" width="24" height="20" rx="4" fill="#f0fdfa"/>
  <text x="110" y="268" font-family="system-ui" font-size="10" fill="#0d9488" text-anchor="middle" font-weight="500">16</text>
  <text x="158" y="268" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">17</text>
  <rect x="194" y="255" width="24" height="20" rx="4" fill="#f0fdfa"/>
  <text x="206" y="268" font-family="system-ui" font-size="10" fill="#0d9488" text-anchor="middle" font-weight="500">18</text>
  <text x="254" y="268" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">19</text>
  <text x="302" y="268" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">20</text>
  <text x="350" y="268" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">21</text>
  
  <!-- Week 4 -->
  <text x="62" y="298" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">22</text>
  <text x="110" y="298" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">23</text>
  <text x="158" y="298" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">24</text>
  <text x="206" y="298" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">25</text>
  <text x="254" y="298" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">26</text>
  <text x="302" y="298" font-family="system-ui" font-size="10" fill="#0f172a" text-anchor="middle">27</text>
  <text x="350" y="298" font-family="system-ui" font-size="10" fill="#94a3b8" text-anchor="middle">28</text>
  
  <!-- Legend -->
  <circle cx="60" y="330" r="4" fill="#0d9488"/>
  <text x="70" y="334" font-family="system-ui" font-size="8" fill="#64748b">Today</text>
  <circle cx="120" y="330" r="4" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text x="130" y="334" font-family="system-ui" font-size="8" fill="#64748b">Available</text>
  <circle cx="195" y="330" r="4" fill="#fef3c7"/>
  <text x="205" y="334" font-family="system-ui" font-size="8" fill="#64748b">Pending</text>
  <circle cx="265" y="330" r="4" fill="#dcfce7"/>
  <text x="275" y="334" font-family="system-ui" font-size="8" fill="#64748b">Confirmed</text>
  
  <!-- Right Panel - Today's Schedule -->
  <rect x="395" y="130" width="165" height="230" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm3)"/>
  
  <text x="410" y="155" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">Thu, Dec 5</text>
  <text x="410" y="170" font-family="system-ui" font-size="9" fill="#64748b">4 appointments</text>
  
  <!-- Appointment 1 -->
  <rect x="405" y="185" width="145" height="45" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text x="415" y="202" font-family="system-ui" font-size="9" fill="#0d9488" font-weight="600">9:00 AM - 9:30 AM</text>
  <text x="415" y="216" font-family="system-ui" font-size="10" fill="#0f172a" font-weight="500">Sarah Johnson</text>
  <text x="415" y="226" font-family="system-ui" font-size="8" fill="#64748b">Initial Consultation</text>
  
  <!-- Appointment 2 -->
  <rect x="405" y="238" width="145" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="415" y="255" font-family="system-ui" font-size="9" fill="#15803d" font-weight="600">10:30 AM - 11:00 AM</text>
  <text x="415" y="269" font-family="system-ui" font-size="10" fill="#0f172a" font-weight="500">Mike Chen</text>
  <text x="415" y="279" font-family="system-ui" font-size="8" fill="#64748b">Follow-up Call</text>
  
  <!-- Appointment 3 -->
  <rect x="405" y="291" width="145" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="415" y="308" font-family="system-ui" font-size="9" fill="#b45309" font-weight="600">2:00 PM - 2:30 PM</text>
  <text x="415" y="322" font-family="system-ui" font-size="10" fill="#0f172a" font-weight="500">Emma Williams</text>
  <text x="415" y="332" font-family="system-ui" font-size="8" fill="#64748b">Pending confirmation</text>
  
  <!-- Sync indicator -->
  <rect x="405" y="345" width="145" height="22" rx="4" fill="#f8fafc"/>
  <circle cx="418" cy="356" r="4" fill="#22c55e"/>
  <text x="428" y="360" font-family="system-ui" font-size="8" fill="#64748b">Synced with Google Calendar</text>
</svg>